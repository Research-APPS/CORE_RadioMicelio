name: Deploy static wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Migrate and seed
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: |
          python manage.py migrate
          python manage.py migrate --database=research_db
          python manage.py migrate --database=ontologizar_db
          python manage.py seed_curriculum
      - name: Build static wiki
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: python manage.py export_static_site --output dist
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
