name: Deploy static wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publicación vía rama gh-pages (peaceiris). No usar deploy-pages@v4 salvo que
# Settings → Pages → Source sea "GitHub Actions" (ver README).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set public SITE_URL
        run: |
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "SITE_URL=${{ vars.SITE_URL }}" >> "$GITHUB_ENV"
          else
            OWNER=$(echo "${{ github.event.repository.owner.login }}" | tr '[:upper:]' '[:lower:]')
            echo "SITE_URL=https://${OWNER}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Migrate and seed
        env:
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: |
          python manage.py migrate
          python manage.py migrate --database=research_db
          python manage.py migrate --database=ontologizar_db
          python manage.py seed_curriculum
      - name: Build static wiki
        env:
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: |
          echo "Exportando con SITE_URL=$SITE_URL"
          python manage.py export_static_site --output dist
          test -f dist/index.html
          test -f dist/biblioteca/index.html
          test -f dist/airam/graph.json
          test -f dist/.nojekyll
      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy static wiki"
