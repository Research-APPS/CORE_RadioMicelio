name: Deploy static wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set public SITE_URL
        run: |
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "SITE_URL=${{ vars.SITE_URL }}" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${{ github.event.repository.owner.login }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Migrate and seed
        env:
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: |
          python manage.py migrate
          python manage.py migrate --database=research_db
          python manage.py migrate --database=ontologizar_db
          python manage.py seed_curriculum
      - name: Build static wiki
        env:
          STATIC_SITE_CNAME: ${{ vars.STATIC_SITE_CNAME }}
          CORE_INSTITUTE_NAME: CORE Radio Micelio
        run: |
          echo "Exportando con SITE_URL=$SITE_URL"
          python manage.py export_static_site --output dist
          test -f dist/index.html
          test -f dist/biblioteca/index.html
          test -f dist/airam/graph.json
          test -f dist/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
