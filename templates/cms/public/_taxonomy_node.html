{% if node.concept %}
<a href="{% url 'biblioteca:topic' node.concept.uuid %}" class="wiki-link">{{ node.label }}</a>
{% else %}
{{ node.label }}
{% endif %}
{% if not node.is_leaf %}
<ul>
  {% for child in node.get_children %}
  <li>{% include "cms/public/_taxonomy_node.html" with node=child %}</li>
  {% endfor %}
</ul>
{% endif %}
